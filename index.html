<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Robots-Tag" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<title>Whisky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "JetBrains Mono", "Fira Code", "SF Mono", "Menlo",
               "Consolas", "Courier New", monospace;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "ss02", "cv01", "cv02";
  cursor: none;
}

/* ══════════════════════════════
   CUSTOM NEON CURSOR
══════════════════════════════ */
#cursor-dot {
  position: fixed;
  width: 24px; height: 24px;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-20%, -15%);
  background: url('cursor.cur') center/contain no-repeat;
  filter: drop-shadow(0 0 2px rgba(255,255,255,0.35));
}
#cursor-ring { display: none; }
.trail-particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: blood-fall 1s ease-out forwards;
}
@keyframes blood-fall {
  from {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
  to {
    opacity: 0;
    transform: translate(calc(-50% + var(--drift-x, 0px)), calc(-50% + 44px));
  }
}

/* hover state — bigger ring */
body.cursor-hover #cursor-dot { transform: translate(-20%, -15%) scale(1.06); }

/* click / press feedback — subtle squeeze + pop */
body.cursor-pressed #cursor-dot { transform: translate(-20%, -15%) scale(0.92); }

/* fade cursor when mouse leaves the window */
#cursor-dot {
  opacity: 1;
  transition: opacity 0.25s ease, transform 0.12s ease;
}
body.cursor-gone #cursor-dot,
body.cursor-gone #cursor-ring {
  opacity: 0;
}

/* ══════════════════════════════
   CLICK TO ENTER
══════════════════════════════ */
#enter-screen {
  position: fixed; inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  transition: opacity 1s ease;
  cursor: none;
  overflow: hidden;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
}
#enter-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}

/* 4 minimal corner brackets */
.enter-corner {
  position: absolute;
  width: 40px; height: 40px;
  border-color: rgba(255,255,255,0.22);
  border-style: solid;
  z-index: 3;
  opacity: 0;
  animation: enter-corner-in 0.5s cubic-bezier(0.2,0.7,0.2,1) forwards 0.1s;
}
.enter-corner.tl { top: 28px; left: 28px;     border-width: 1px 0 0 1px; }
.enter-corner.tr { top: 28px; right: 28px;    border-width: 1px 1px 0 0; animation-delay: 0.18s; }
.enter-corner.bl { bottom: 28px; left: 28px;  border-width: 0 0 1px 1px; animation-delay: 0.24s; }
.enter-corner.br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; animation-delay: 0.30s; }
@keyframes enter-corner-in {
  from { opacity: 0; transform: scale(0.6); }
  to   { opacity: 1; transform: scale(1);   }
}

/* central content column */
.enter-content {
  position: relative;
  z-index: 4;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  text-align: center;
}

/* single center title with iPhone-style typography */
.enter-title {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
               "Helvetica Neue", Arial, sans-serif;
  font-size: clamp(2.6rem, 7.8vw, 4.6rem);
  font-weight: 700;
  letter-spacing: 3px;
  color: #fff;
  text-transform: uppercase;
  line-height: 1;
  opacity: 0;
  animation: enter-fade-in 0.18s ease forwards 0.03s;
  text-shadow:
    0 0 8px rgba(255,255,255,0.32),
    0 0 20px rgba(255,255,255,0.12);
  transition: color 0.18s ease, text-shadow 0.18s ease;
}
.enter-title.enter-blood {
  color: #ad0000;
  text-shadow:
    0 0 8px rgba(173,0,0,0.75),
    0 0 22px rgba(120,0,0,0.45);
}

@keyframes enter-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0);   }
}
@media (prefers-reduced-motion: reduce) {
  .enter-title,
  .enter-corner {
    animation: none !important;
    opacity: 1;
  }
}

/* ══════════════════════════════
   VIDEO
══════════════════════════════ */
video {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 2.8s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 0;
  filter: blur(7px);
}
video.visible { opacity: 1; }

.fallback-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 30% 40%, #1a0a2e 0%, transparent 60%),
    radial-gradient(ellipse at 70% 70%, #0d1a2e 0%, transparent 60%),
    #000;
}

/* ══════════════════════════════
   ATMOSPHERIC LAYERS
══════════════════════════════ */
.scanlines {
  position: fixed; inset: 0; z-index: 5; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
  );
  opacity: 0; transition: opacity 2s ease;
}
.scanlines.visible { opacity: 1; }

.vignette {
  position: fixed; inset: 0; z-index: 6; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.85) 100%);
  opacity: 0; transition: opacity 2s ease;
}
.vignette.visible { opacity: 1; }

/* ══════════════════════════════
   EYE OVERLAY
══════════════════════════════ */
.cinematic-overlay {
  position: fixed; inset: 0; z-index: 10; pointer-events: none;
}
.eye {
  position: absolute; left: 0;
  width: 100%; height: 50%;
  background: #000;
  transition: transform 2s cubic-bezier(0.7, 0, 0.2, 1);
  will-change: transform;
}
.eye-top    { top: 0; }
.eye-bottom { bottom: 0; }
.cinematic-overlay.open .eye-top    { transform: translateY(-100%); }
.cinematic-overlay.open .eye-bottom { transform: translateY(100%); }

/* ══════════════════════════════
   VOLUME SLIDER — TOP LEFT
══════════════════════════════ */
#volume-control {
  position: fixed;
  top: 28px; left: 28px;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  transform: translateX(-10px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#volume-control.visible {
  opacity: 1;
  transform: translateX(0);
}

.vol-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
  opacity: 0.85;
}

/* custom range slider */
#volume-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 110px;
  height: 3px;
  border-radius: 2px;
  outline: none;
  background: linear-gradient(
    to right,
    #fff 0%,
    #fff var(--val, 100%),
    rgba(255,255,255,0.15) var(--val, 100%),
    rgba(255,255,255,0.15) 100%
  );
  box-shadow: 0 0 6px rgba(255,255,255,0.4), 0 0 12px rgba(255,255,255,0.15);
  cursor: none;
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow:
    0 0 4px #fff,
    0 0 10px #fff,
    0 0 20px rgba(255,255,255,0.7);
  cursor: none;
  transition: transform 0.15s;
}
#volume-slider::-webkit-slider-thumb:hover {
  transform: scale(1.3);
}
#volume-slider::-moz-range-thumb {
  width: 12px; height: 12px;
  border: none;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 4px #fff, 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.7);
  cursor: none;
}

/* ══════════════════════════════
   CENTER TEXT
══════════════════════════════ */
.intro-text {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  z-index: 20;
  opacity: 0;
  transition: opacity 1.5s ease;
  pointer-events: none;
  user-select: none;
  perspective: 900px;
  perspective-origin: 50% 50%;
  transform-style: preserve-3d;
}
.intro-text.show {
  opacity: 1;
}

.intro-label {
  font-size: clamp(0.95rem, 2.3vw, 1.9rem);
  font-weight: 500;
  letter-spacing: 0;
  text-align: center;
  white-space: nowrap;
  /* mix-blend-mode makes it use opposite/contrast color vs background */
  mix-blend-mode: difference;
  color: #fff;
  opacity: 0.95;
  animation: none;
}
.intro-text.show .intro-label {
  animation: flicker 3s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 0.9; }
  45%       { opacity: 0.75; }
  50%       { opacity: 0.3; }
  55%       { opacity: 0.88; }
}

/* ══════════════════════════════
   JOIN US BUTTON
══════════════════════════════ */
.join-btn {
  pointer-events: all;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 28px;
  font-family: inherit;
  font-weight: 500;
  font-size: clamp(0.55rem, 1.05vw, 0.7rem);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-decoration: none;
  color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.4);
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, color 0.3s;
  mix-blend-mode: difference;
}
.join-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}
.join-btn:hover::before {
  transform: translateX(100%);
}
.join-btn:hover {
  border-color: rgba(255,255,255,0.95);
  box-shadow:
    0 0 8px rgba(255,255,255,0.3),
    0 0 20px rgba(255,255,255,0.15),
    inset 0 0 8px rgba(255,255,255,0.05);
}
/* discord icon svg inline */
.join-btn svg {
  width: 13px; height: 13px;
  fill: currentColor;
  flex-shrink: 0;
}

/* corner decorations on button */
.join-btn .corner {
  position: absolute;
  width: 5px; height: 5px;
  border-color: #fff;
  border-style: solid;
  opacity: 0.7;
}
.join-btn .corner.tl { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
.join-btn .corner.tr { top: -1px; right: -1px; border-width: 1px 1px 0 0; }
.join-btn .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 1px 1px; }
.join-btn .corner.br { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

/* ══════════════════════════════
   SCANLINES & VIGNETTE
══════════════════════════════ */

/* ══════════════════════════════
   TITLE ROW
══════════════════════════════ */
.title-row {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ══════════════════════════════
   BADGES 
══════════════════════════════ */
.badges {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  pointer-events: all;
  padding-left: 6px;
  position: relative;
}
.badges::before {
  content: '';
  position: absolute;
  left: -9px;
  top: 50%;
  width: 1px; height: 24px;
  transform: translateY(-50%);
  background: linear-gradient(to bottom,
    transparent,
    rgba(255,255,255,0.55),
    transparent);
}

.badge {
  position: relative;
  width: 36px; height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  cursor: none;
  outline: none;
  border-radius: 9px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.35) inset,
    0 3px 10px rgba(0,0,0,0.45);
  transition: transform 0.25s cubic-bezier(0.2, 0.7, 0.2, 1),
              background 0.25s ease,
              border-color 0.25s ease,
              box-shadow 0.25s ease;
}

.badge svg,
.badge .badge-img {
  width: 20px; height: 20px;
  overflow: visible;
  transition: transform 0.3s cubic-bezier(0.2, 0.7, 0.2, 1),
              filter 0.3s ease;
  user-select: none;
  -webkit-user-drag: none;
}

.badge svg {
  stroke: #ffffff;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
  filter:
    drop-shadow(0 0 2.5px rgba(255,255,255,0.65))
    drop-shadow(0 0 6px rgba(255,255,255,0.35));
}


.badge .badge-img {
  object-fit: contain;
  /* brightness(0) makes it pure black, invert(1) flips to pure white */
  filter:
    brightness(0) invert(1)
    drop-shadow(0 0 2px rgba(255,255,255,0.6))
    drop-shadow(0 0 5px rgba(255,255,255,0.3));
}

/* idle breathing pulse — both SVG and PNG */
.badge svg,
.badge .badge-img {
  animation: badge-breathe 4s ease-in-out infinite;
}
.badge:nth-child(2) svg,
.badge:nth-child(2) .badge-img { animation-delay: 0.5s; }
.badge:nth-child(3) svg,
.badge:nth-child(3) .badge-img { animation-delay: 1.0s; }
.badge:nth-child(4) svg,
.badge:nth-child(4) .badge-img { animation-delay: 1.5s; }

@keyframes badge-breathe {
  0%, 100% {
    filter:
      drop-shadow(0 0 2px rgba(255,255,255,0.6))
      drop-shadow(0 0 5px rgba(255,255,255,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 3px rgba(255,255,255,0.95))
      drop-shadow(0 0 9px rgba(255,255,255,0.5));
  }
}

@keyframes badge-breathe-img {
  0%, 100% {
    filter:
      brightness(0) invert(1)
      drop-shadow(0 0 2px rgba(255,255,255,0.6))
      drop-shadow(0 0 5px rgba(255,255,255,0.3));
  }
  50% {
    filter:
      brightness(0) invert(1)
      drop-shadow(0 0 3px rgba(255,255,255,0.95))
      drop-shadow(0 0 9px rgba(255,255,255,0.5));
  }
}
.badge .badge-img {
  animation-name: badge-breathe-img;
}

.badge:hover,
.badge:focus-visible {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.95);
  transform: translateY(-3px);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.35) inset,
    0 0 12px rgba(255,255,255,0.4),
    0 0 28px rgba(255,255,255,0.2),
    0 6px 16px rgba(0,0,0,0.55);
}
.badge:hover svg,
.badge:focus-visible svg {
  transform: scale(1.18);
  filter:
    drop-shadow(0 0 3px #fff)
    drop-shadow(0 0 10px rgba(255,255,255,0.95))
    drop-shadow(0 0 22px rgba(255,255,255,0.55));
  animation: none;
}
.badge:hover .badge-img,
.badge:focus-visible .badge-img {
  transform: scale(1.18);
  filter:
    brightness(0) invert(1)
    drop-shadow(0 0 3px #fff)
    drop-shadow(0 0 10px rgba(255,255,255,0.95))
    drop-shadow(0 0 22px rgba(255,255,255,0.55));
  animation: none;
}

@media (prefers-reduced-motion: reduce) {
  .badge svg { animation: none; }
  .badge { transition: none; }
}

/* ── tooltip (typewriter) ── */
.badge-tip {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%) translateY(6px) scale(0.96);
  padding: 7px 13px;
  font-family: inherit;
  font-weight: 500;
  font-size: 0.65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  background: rgba(0,0,0,0.88);
  border: 1px solid rgba(255,255,255,0.28);
  color: #fff;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
  text-shadow: 0 0 4px rgba(255,255,255,0.7), 0 0 10px rgba(255,255,255,0.3);
  box-shadow: 0 0 10px rgba(255,255,255,0.18);
  z-index: 30;
}
.badge-tip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border: 4px solid transparent;
  border-top-color: rgba(0,0,0,0.88);
}
.badge:hover .badge-tip,
.badge:focus-visible .badge-tip,
.social:hover .badge-tip,
.social:focus-visible .badge-tip {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}

.badge-tip-text { display: inline-block; }
.badge-tip-caret {
  display: inline-block;
  margin-left: 2px;
  width: 0.5ch;
  color: rgba(255,255,255,0.85);
  animation: caret-blink 0.85s steps(2) infinite;
}
@keyframes caret-blink { 50% { opacity: 0; } }

/* ══════════════════════════════
   PROFILE CARD
══════════════════════════════ */
.profile-card {
  position: relative;
  width: min(92vw, 620px);
  padding: 26px 28px 22px;
  background: rgba(10, 10, 14, 0.55);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  backdrop-filter: blur(22px) saturate(130%);
  -webkit-backdrop-filter: blur(22px) saturate(130%);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.4) inset,
    0 20px 60px rgba(0,0,0,0.5),
    0 0 40px rgba(255,255,255,0.04);
  display: flex;
  flex-direction: column;
  gap: 20px;
  pointer-events: all;
  transform-style: flat;
  backface-visibility: hidden;
  will-change: transform, box-shadow;
}

.profile-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background:
    /* hot spot that tracks the cursor */
    radial-gradient(
      240px 200px at var(--glare-x, 50%) var(--glare-y, 50%),
      rgba(255,255,255,0.26),
      rgba(255,255,255,0.08) 35%,
      rgba(255,255,255,0) 70%),
    /* broader directional sheen driven by tilt */
    linear-gradient(
      var(--light-angle, 135deg),
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.02) 40%,
      rgba(255,255,255,0) 70%);
  opacity: 0.35;
  transition: opacity 0.35s ease;
  mix-blend-mode: screen;
  z-index: 5;
}
.profile-card.tilt-active::after { opacity: 1; }

.profile-card > .card-rim {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 4;
  box-shadow:
    /* top */    inset 0  1px 0 rgba(255,255,255, var(--rim-top,    0.10)),
    /* bottom */ inset 0 -1px 0 rgba(255,255,255, var(--rim-bottom, 0.05)),
    /* left  */  inset  1px 0 0 rgba(255,255,255, var(--rim-left,   0.08)),
    /* right */  inset -1px 0 0 rgba(255,255,255, var(--rim-right,  0.08)),
    /* ambient inner glow */
    inset 0 0 32px rgba(255,255,255,0.025);
  opacity: 1;
  transition: box-shadow 0.08s linear;
}

/* honour user preference */
@media (prefers-reduced-motion: reduce) {
  .profile-card { transform: none !important; }
}

/* subtle sheen on top edge */
.profile-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent);
  pointer-events: none;
}

/* ── HEADER: avatar + identity ── */
.profile-header {
  display: flex;
  align-items: center;
  gap: 18px;
}

.profile-avatar {
  position: relative;
  width: 72px; height: 72px;
  flex-shrink: 0;
}
.profile-avatar .avatar-clip {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  overflow: hidden;
  background: radial-gradient(circle at 30% 30%,
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.02));
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.2),
    inset 0 0 20px rgba(0,0,0,0.5),
    0 0 12px rgba(255,255,255,0.15);
}
.avatar-ring {
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.3);
  pointer-events: none;
  animation: ring-rotate 12s linear infinite;
}
.avatar-ring::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 8px #fff, 0 0 16px rgba(255,255,255,0.6);
}
@keyframes ring-rotate {
  to { transform: rotate(360deg); }
}
.avatar-inner {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  font-weight: 600;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
  user-select: none;
  letter-spacing: 0;
}
.avatar-inner img,
.avatar-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s ease;
  border-radius: 50%;
}
.avatar-img.loaded { opacity: 1; }
.avatar-fallback {
  transition: opacity 0.35s ease;
}
/* hide the placeholder letter once the real avatar is in */
.profile-avatar.has-avatar .avatar-fallback { opacity: 0; }

/* Discord Nitro avatar decoration
   sized at 1.5x the avatar per Discord spec */
.avatar-decoration {
  position: absolute;
  top: 50%; left: 50%;
  width: 150%; height: 150%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  user-select: none;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.6s ease;
  /* subtle glow so the decoration feels integrated with the card */
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
}
.avatar-decoration.loaded { opacity: 1; }

.profile-identity {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
  flex: 1;
}
.identity-name-row {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.profile-name {
  margin: 0;
  font-size: clamp(1.25rem, 2vw, 1.6rem);
  font-weight: 600;
  filter: drop-shadow(0 0 12px rgba(0, 0, 0, 1));
  text-shadow: 0 0 20px #1b1b1b;
  letter-spacing: -0.01em;
  line-height: 1.1;

  /* 1. Geniş bir siyah-beyaz-siyah döngüsü kuruyoruz (akıcılık için) */
  background: linear-gradient(
    to right, 
    #252525 0%, 
    #ffffff 50%, 
    #252525 100%
  );
  
  /* 2. Arka planı yazının 2 katı genişliğine çıkarıyoruz */
  background-size: 200% auto;
  
  /* 3. Yazı maskeleme kuralları */
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;

  /* 4. Animasyonu tetikliyoruz (3 saniyede bir döner, lineer ve sonsuz) */
  animation: shine 3s linear infinite;
}

/* 5. Soldan sağa kaydırma mekanizması */
@keyframes shine {
  0% {
    background-position: 0% center;
  }
  100% {
    background-position: -200% center; /* Negatif yön soldan sağa akış sağlar */
  }
}
.profile-role,
.profile-meta {
  /* start hidden — revealed once all widgets have finished loading */
  opacity: 0;
  transform: translateY(6px);
  filter: blur(4px);
  transition:
    opacity 0.8s cubic-bezier(0.2, 0.7, 0.2, 1),
    transform 0.8s cubic-bezier(0.2, 0.7, 0.2, 1),
    filter 0.8s cubic-bezier(0.2, 0.7, 0.2, 1);
}
.profile-role.revealed,
.profile-meta.revealed {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}
.profile-meta.revealed { transition-delay: 0.15s; }

/* ══════════════════════════════
   CREDITS LINE
   ══════════════════════════════ */
.profile-role {
  position: relative;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  font-size: 0.74rem;
  line-height: 1.4;
  margin-top: 4px;
  padding: 5px 10px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.01));
  box-shadow: inset 0 0 20px rgba(255,255,255,0.015);
  overflow: hidden;
  isolation: isolate;
}

.profile-role::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  left: -40%;
  width: 30%;
  background: linear-gradient(
    100deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.10) 45%,
    rgba(255,255,255,0.18) 50%,
    rgba(255,255,255,0.10) 55%,
    rgba(255,255,255,0) 100%);
  transform: skewX(-18deg);
  pointer-events: none;
  z-index: 0;
}
.profile-role.revealed::before {
  animation: role-scan 6.5s cubic-bezier(0.6, 0, 0.4, 1) 1.2s infinite;
}
@keyframes role-scan {
  0%   { left: -40%;  opacity: 0; }
  8%   { opacity: 1; }
  40%  { left: 140%; opacity: 1; }
  42%  { opacity: 0; }
  100% { left: 140%; opacity: 0; }
}

.profile-role > * { position: relative; z-index: 1; }

.profile-role .credit {
  display: inline-flex;
  align-items: baseline;
  gap: 7px;
}
.profile-role .credit-label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.62);
  text-shadow: 0 0 8px rgba(255,255,255,0.08);
}
.profile-role .credit-name {
  font-size: 0.92rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.2px;
  position: relative;
  /* continuous gentle glow breath */
  animation: name-breath 3.4s ease-in-out infinite;
}
.profile-role .credit:nth-child(3) .credit-name {
  animation-delay: 1.7s;   /* offset so the two names breathe out-of-phase */
}
@keyframes name-breath {
  0%, 100% {
    text-shadow:
      0 0 6px  rgba(255,255,255,0.22),
      0 0 1px  rgba(255,255,255,0.5);
  }
  50% {
    text-shadow:
      0 0 18px rgba(255,255,255,0.55),
      0 0 2px  rgba(255,255,255,0.7),
      0 0 30px rgba(255,255,255,0.18);
  }
}
.profile-role .credit-name::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -3px;
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.55),
    transparent);
  opacity: 0;
  transform: scaleX(0.4);
  transform-origin: center;
  transition:
    opacity 0.3s ease,
    transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
}
.profile-role .credit:hover .credit-name::after {
  opacity: 1;
  transform: scaleX(1);
}

/* blinking // separator like a terminal caret */
.profile-role .credit-sep {
  color: rgba(255,255,255,0.55);
  font-weight: 800;
  font-size: 0.82rem;
  letter-spacing: 1px;
  user-select: none;
  animation: sep-blink 1.2s steps(2, end) infinite;
}
@keyframes sep-blink {
  0%, 55%  { opacity: 1;   text-shadow: 0 0 8px rgba(255,255,255,0.35); }
  60%, 100%{ opacity: 0.25; text-shadow: none; }
}

/* ── META LINE (ErAy · est. 2026) ── */
.profile-meta {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 6px;
  color: rgba(255,255,255,0.62);
  position: relative;
  display: inline-block;
  padding-left: 14px;
}
.profile-meta::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #43b581;
  box-shadow: 0 0 8px rgba(67,181,129,0.8);
  transform: translateY(-50%);
  animation: meta-dot 1.8s ease-in-out infinite;
}
@keyframes meta-dot {
  0%, 100% { opacity: 1;   transform: translateY(-50%) scale(1);   }
  50%      { opacity: 0.4; transform: translateY(-50%) scale(0.75);}
}

/* on first reveal, briefly super-glow both names */
.profile-role.revealed .credit-name {
  animation:
    name-breath 3.4s ease-in-out infinite,
    credit-pulse 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.25s 1 both;
}
.profile-role.revealed .credit:nth-child(3) .credit-name {
  animation-delay: 1.7s, 0.5s;
}
@keyframes credit-pulse {
  0%   { filter: brightness(1);   }
  25%  { filter: brightness(1.45) drop-shadow(0 0 12px rgba(255,255,255,0.7)); }
  100% { filter: brightness(1);   }
}

/* ── WIDGETS ── */
.profile-widgets {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.widget {
  position: relative;
  padding: 12px 14px;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 62px;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    0 2px 10px rgba(0,0,0,0.25);
  transition: border-color 0.35s ease, background 0.35s ease, transform 0.35s ease;
}
.widget::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background: radial-gradient(
    140% 120% at 0% 0%,
    rgba(255,255,255,0.05),
    transparent 55%);
}

/* ── DISCORD PRESENCE ── */
.widget-presence {
  position: relative;
  overflow: hidden;
  min-height: 66px;
  padding: 12px 14px;
  transition: border-color 0.5s ease, background 0.5s ease, transform 0.35s ease;
}
.widget-presence:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.18);
}

.presence-avatar {
  position: relative;
  width: 44px; height: 44px;
  flex-shrink: 0;
  border-radius: 10px;
  overflow: visible;
}
.presence-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  display: block;
  transition: border-radius 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.12),
    0 2px 6px rgba(0,0,0,0.4);
}
/* placeholder shimmer until first image loads */
.presence-avatar img:not([src]),
.presence-avatar img[src=""] {
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.05)
  );
  background-size: 200% 100%;
  animation: shimmer 1.5s linear infinite;
}
@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

.presence-status-dot {
  position: absolute;
  bottom: -2px; right: -2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2.5px solid rgba(10, 10, 14, 0.98);
  background: #747f8d;
  transition: background 0.4s ease, box-shadow 0.4s ease;
  z-index: 2;
}
.presence-status-dot[data-status="online"]  { background: #43b581; box-shadow: 0 0 8px rgba(67,181,129,0.8); }
.presence-status-dot[data-status="idle"]    { background: #faa61a; box-shadow: 0 0 8px rgba(250,166,26,0.7); }
.presence-status-dot[data-status="dnd"]     { background: #f04747; box-shadow: 0 0 8px rgba(240,71,71,0.7); }
.presence-status-dot[data-status="offline"] { background: #747f8d; box-shadow: none; }

.presence-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}
/* activity type tag */
.presence-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  align-self: flex-start;
  padding: 2px 7px;
  font-size: 0.52rem;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.78);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  line-height: 1;
  transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
}
.presence-tag::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 5px currentColor;
}
.presence-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: #fff;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.15px;
  line-height: 1.25;
}
.presence-sub {
  font-size: 0.62rem;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.4px;
  line-height: 1.3;
}

/* Spotify mode: green accent + round spinning album art + progress bar */
.widget-presence.is-spotify {
  background: linear-gradient(135deg,
    rgba(30, 215, 96, 0.12),
    rgba(30, 215, 96, 0.02) 60%);
  border-color: rgba(30, 215, 96, 0.35);
}
.widget-presence.is-spotify .presence-avatar img {
  border-radius: 50%;
  animation: vinyl-spin 6s linear infinite;
  box-shadow:
    inset 0 0 0 2px rgba(0,0,0,0.4),
    0 0 0 2px rgba(30, 215, 96, 0.5),
    0 0 14px rgba(30, 215, 96, 0.4);
}
.widget-presence.is-spotify .presence-status-dot {
  background: #1ed760;
  box-shadow: 0 0 10px rgba(30, 215, 96, 0.9);
}
.widget-presence.is-spotify .presence-tag {
  color: #1ed760;
  background: rgba(30, 215, 96, 0.12);
  border-color: rgba(30, 215, 96, 0.35);
}
@keyframes vinyl-spin {
  to { transform: rotate(360deg); }
}

.presence-progress {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.presence-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #1ed760, #1db954);
  box-shadow: 0 0 6px rgba(30, 215, 96, 0.6);
  transition: width 1s linear;
}

/* game/activity mode: blurple accent */
.widget-presence.is-playing {
  border-color: rgba(88, 101, 242, 0.35);
  background: linear-gradient(135deg,
    rgba(88, 101, 242, 0.12),
    rgba(88, 101, 242, 0.02) 60%);
}
.widget-presence.is-playing .presence-status-dot {
  box-shadow: 0 0 8px rgba(88, 101, 242, 0.6);
}
.widget-presence.is-playing .presence-tag {
  color: #8c9eff;
  background: rgba(88, 101, 242, 0.15);
  border-color: rgba(88, 101, 242, 0.4);
}

/* custom status mode: soft white accent */
.widget-presence.is-custom .presence-tag {
  color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.15);
}

/* disconnected / error state */
.widget-presence[data-state="error"] { opacity: 0.7; }
.widget-presence[data-state="error"] .presence-title { color: rgba(255,255,255,0.6); }

.widget-body {
  min-width: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.widget-title {
  font-size: 0.68rem;
  font-weight: 500;
  color: rgba(255,255,255,0.88);
  letter-spacing: 0.2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.widget-sub {
  font-size: 0.58rem;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.5px;
}
/* loading dots */
.loading-dots::after {
  content: '';
  animation: dots 1.4s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
  100% { content: ''; }
}

/* server widget */
.widget-server {
  flex-direction: row;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  min-height: 68px;
}
.widget-server-icon {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #5865f2, #404eed);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.2),
    0 2px 8px rgba(88,101,242,0.35);
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}
.widget-server-icon svg {
  width: 22px; height: 22px;
  fill: #fff;
}
.widget-server-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.widget-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  line-height: 1;
  text-shadow: 0 0 8px rgba(255,255,255,0.15);
}
.widget-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
  letter-spacing: 0.3px;
}
.widget-stats b {
  color: rgba(255,255,255,0.92);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.stat-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
  transition: background 0.4s ease, box-shadow 0.4s ease;
}
.stat-dot.green {
  background: #43b581;
  box-shadow: 0 0 6px rgba(67,181,129,0.7);
  animation: status-pulse 1.8s ease-in-out infinite;
}
.stat-dot.gray  { background: rgba(255,255,255,0.35); }

.widget-join {
  position: relative;
  flex-shrink: 0;
  padding: 7px 16px;
  font-family: inherit;
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  text-decoration: none;
  color: #fff;
  background: linear-gradient(135deg,
    rgba(67, 181, 129, 0.28),
    rgba(67, 181, 129, 0.14));
  border: 1px solid rgba(67, 181, 129, 0.55);
  border-radius: 7px;
  cursor: none;
  transition: transform 0.25s cubic-bezier(0.2, 0.7, 0.2, 1),
              background 0.25s ease,
              border-color 0.25s ease,
              box-shadow 0.25s ease;
  text-shadow: 0 0 6px rgba(67,181,129,0.5);
}
.widget-join:hover {
  background: linear-gradient(135deg,
    rgba(67, 181, 129, 0.45),
    rgba(67, 181, 129, 0.28));
  border-color: rgba(67, 181, 129, 1);
  box-shadow:
    0 0 14px rgba(67,181,129,0.55),
    0 0 28px rgba(67,181,129,0.25);
  transform: translateY(-1px);
}

/* ── SOCIAL ICONS ROW ── */
.profile-socials {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 4px;
}

.social {
  position: relative;
  width: 34px; height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: #fff;
  text-decoration: none;
  cursor: none;
  transition: all 0.25s cubic-bezier(0.2, 0.7, 0.2, 1);
}
.social svg {
  width: 15px; height: 15px;
  fill: #fff;
  transition: transform 0.25s ease, filter 0.25s ease;
  filter: drop-shadow(0 0 2px rgba(255,255,255,0.4));
}
.social:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.9);
  transform: translateY(-2px);
  box-shadow:
    0 0 10px rgba(255,255,255,0.3),
    0 4px 12px rgba(0,0,0,0.4);
}
.social:hover svg {
  transform: scale(1.15);
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.9));
}

/* social tooltip */
.social .badge-tip {
  bottom: calc(100% + 8px);
}

/* ── FOOTER: views + live clock ── */
.profile-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin-top: 4px;
  font-size: 0.62rem;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.5px;
}
.profile-views {
  display: flex;
  align-items: center;
  gap: 8px;
}
.profile-views svg {
  width: 13px; height: 13px;
  stroke: rgba(255,255,255,0.55);
  stroke-width: 1.6;
  fill: none;
}
.profile-views-label {
  font-size: 0.52rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.profile-views-count {
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 6px rgba(255,255,255,0.15);
}
.profile-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.6rem;
  letter-spacing: 0.5px;
}
.profile-status::before {
  content: '';
  display: inline-block;
  width: 5px; height: 5px;

      tiltCard.style.setProperty('--rim-left',   (0.08 + rimLeft   * 0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-right',  (0.08 + rimRight  * 0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-top',    (0.10 + rimTop    * 0.28).toFixed(3));
      tiltCard.style.setProperty('--rim-bottom', (0.05 + rimBottom * 0.22).toFixed(3));

      const tiltMag = Math.min(1, (Math.abs(cx) + Math.abs(cy)) / (MAX_DEG * 1.2));
      const shadowX = ( cy * 2.2).toFixed(1);
      const shadowY = (14 - cx * 2.0).toFixed(1);
      const shadowBlur   = (55 + tiltMag * 45).toFixed(0);
      const shadowSpread = -(20 + tiltMag * 10).toFixed(0);
      const shadowAlpha  = (0.55 + tiltMag * 0.20).toFixed(3);
      tiltCard.style.boxShadow =
        `${shadowX}px ${shadowY}px ${shadowBlur}px ${shadowSpread}px rgba(0,0,0,${shadowAlpha}),` +
        ` 0 6px 18px -8px rgba(0,0,0,0.45),` +
        ` 0 0 0 1px rgba(0,0,0,0.35) inset,` +
        ` 0 1px 0 rgba(255,255,255,0.08) inset`;

      requestAnimationFrame(tick);
    })();
  }

  /* ── VOLUME SLIDER ── */
  function updateSliderTrack(val) {
    volSlider.style.setProperty('--val', val + '%');
    if (val == 0) {
      volWave1.style.opacity = '0';
      volWave2.style.opacity = '0';
    } else if (val < 50) {
      volWave1.style.opacity = '0.85';
      volWave2.style.opacity = '0';
    } else {
      volWave1.style.opacity = '0.85';
      volWave2.style.opacity = '0.5';
    }
  }

  let volumeFadeInterval = null;
  let userTouchedVolume  = false;

  function stopVolumeFade() {
    if (volumeFadeInterval) {
      clearInterval(volumeFadeInterval);
      volumeFadeInterval = null;
    }
  }

  volSlider.addEventListener('input', () => {
    userTouchedVolume = true;
    stopVolumeFade();
    const val = parseInt(volSlider.value);
    document.getElementById('bg-music').volume = val / 100;
    document.getElementById('bg-music').muted  = val === 0;
    updateSliderTrack(val);
  });

  ['pointerdown', 'mousedown', 'touchstart', 'keydown', 'wheel'].forEach(ev => {
    volSlider.addEventListener(ev, () => {
      userTouchedVolume = true;
      stopVolumeFade();
    }, { passive: true });
  });

  /* ── ENTER SEQUENCE ── */
  video.load();
  video.loop = true;
  video.addEventListener('ended', () => {
    video.currentTime = 0;
    video.play().catch(() => {});
  });

  const keyEnterHandler = (e) => {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space') {
      e.preventDefault();
      enterScreen.click();
      document.removeEventListener('keydown', keyEnterHandler);
    }
  };
  document.addEventListener('keydown', keyEnterHandler);

  enterScreen.addEventListener('click', async () => {
    playEnterClick();
    enterScreen.classList.add('fade-out');
    setTimeout(() => enterScreen.remove(), 1000);

    document.getElementById('bg-music').play();
    video.muted  = true;
    video.volume = 0;

    try {
      await video.play();
    } catch (e) {
      video.muted = true;
      await video.play().catch(() => {});
    }

    setTimeout(() => video.classList.add('visible'), 200);

    setTimeout(() => {
      scanlines.classList.add('visible');
      vignette.classList.add('visible');
    }, 800);

    setTimeout(() => overlay.classList.add('open'), 600);
    setTimeout(() => text.classList.add('show'), 1800);

    setTimeout(() => volControl.classList.add('visible'), 2200);

    setTimeout(() => {
      if (video.muted || userTouchedVolume) return;
      stopVolumeFade();
      volumeFadeInterval = setInterval(() => {
        if (userTouchedVolume) { stopVolumeFade(); return; }
        video.volume = Math.min(document.getElementById('bg-music').volume + 0.015, 1);
        const pct = Math.round(document.getElementById('bg-music').volume * 100);
        updateSliderTrack(pct);
        volSlider.value = pct;
        if (document.getElementById('bg-music').volume >= 1) stopVolumeFade();
      }, 80);
    }, 900);
  }, { once: true });

  /* ── TYPEWRITER TOOLTIP (badges + socials) ── */
  document.querySelectorAll('.badge, .social').forEach(el => {
    const tip     = el.dataset.tip || '';
    const textEl  = el.querySelector('.badge-tip-text');
    if (!textEl) return;

    let typingTimer = null;

    const type = () => {
      clearTimeout(typingTimer);
      let i = 0;
      textEl.textContent = '';
      const tick = () => {
        if (i <= tip.length) {
          textEl.textContent = tip.slice(0, i);
          i++;
          typingTimer = setTimeout(tick, 55);
        }
      };
      tick();
    };

    const stop = () => clearTimeout(typingTimer);

    el.addEventListener('mouseenter', type);
    el.addEventListener('focus',      type);
    el.addEventListener('mouseleave', stop);
    el.addEventListener('blur',       stop);
  });

  /* ── WATERMARK fade-in ── */
  const watermark = document.getElementById('watermark');
  if (watermark) {
    setTimeout(() => watermark.classList.add('show'), 2400);
  }

  /* ── LIVE CLOCK (Europe/Istanbul) ── */
  const clockEl = document.getElementById('profile-clock');
  if (clockEl) {
    const fmt = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Europe/Istanbul',
      hour:   '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
    const tickClock = () => { clockEl.textContent = fmt.format(new Date()); };
    tickClock();
    setInterval(tickClock, 1000);
  }

  /* ══════════════════════════════
     REVEAL ORCHESTRATION
  ══════════════════════════════ */
  const roleEls = document.querySelectorAll('.profile-role, .profile-meta');
  let presenceReady   = false;
  let serverStatsReady = false;
  let widgetsRevealed = false;

  function maybeRevealWidgets() {
    if (widgetsRevealed) return;
    if (presenceReady && serverStatsReady) {
      widgetsRevealed = true;
      roleEls.forEach(el => el.classList.add('revealed'));
    }
  }
  setTimeout(() => {
    if (!widgetsRevealed) {
      widgetsRevealed = true;
      roleEls.forEach(el => el.classList.add('revealed'));
    }
  }, 2700);

  window.__hdMark = key => {
    if (key === 'presence')  presenceReady    = true;
    if (key === 'server')    serverStatsReady = true;
    maybeRevealWidgets();
  };

  /* ══════════════════════════════
     DISCORD PRESENCE — Lanyard WebSocket
     https://github.com/Phineas/lanyard
  ══════════════════════════════ */
  const DISCORD_ID = '960884354396090470';

  const presenceEl    = document.getElementById('presence-widget');
  const presenceTag   = document.getElementById('presence-tag');
  const presenceTitle = document.getElementById('presence-title');
  const presenceSub   = document.getElementById('presence-sub');
  const presenceDot   = document.getElementById('presence-status-dot');
  const presenceImg   = document.getElementById('presence-avatar-img');
  const presenceBar   = document.getElementById('presence-progress');
  const presenceBarFill = document.getElementById('presence-progress-bar');

  const profileAvatarEl   = document.getElementById('profile-avatar');
  const profileAvatarImg  = document.getElementById('profile-avatar-img');
  const profileDecoration = document.getElementById('profile-avatar-decoration');
  const profileNameEl     = document.getElementById('profile-name');

  function setPresenceTag(text) {
    if (!presenceTag) return;
    if (!text) {
      presenceTag.hidden = true;
      presenceTag.textContent = '';
    } else {
      presenceTag.hidden = false;
      presenceTag.textContent = text;
    }
  }

  if (presenceEl) {
    const STATUS_LABEL = {
      online:  'Online',
      idle:    'Idle',
      dnd:     'Do Not Disturb',
      offline: 'Offline'
    };

    const ACT_PLAYING   = 0;
    const ACT_STREAMING = 1;
    const ACT_LISTENING = 2;
    const ACT_WATCHING  = 3;
    const ACT_CUSTOM    = 4;
    const ACT_COMPETING = 5;

    let spotifyTimer = null;

    const LANYARD_AVATAR = ext => `https://api.lanyard.rest/${DISCORD_ID}.${ext}`;

    function avatarUrl(user) {
      if (user && user.avatar) {
        const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
        return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=128`;
      }
      return LANYARD_AVATAR('png');
    }

    presenceImg.src = LANYARD_AVATAR('png');

    function decorationUrl(asset) {
      if (!asset) return null;
      return `https://cdn.discordapp.com/avatar-decoration-presets/${asset}.png?size=240&passthrough=true`;
    }

    function applyProfileDecoration(user) {
      if (!profileDecoration || !user) return;
      const asset = user.avatar_decoration_data && user.avatar_decoration_data.asset;
      const url   = decorationUrl(asset);
      if (url) {
        if (profileDecoration.dataset.src !== url) {
          profileDecoration.dataset.src = url;
          profileDecoration.hidden = false;
          profileDecoration.classList.remove('loaded');
          profileDecoration.onload  = () => profileDecoration.classList.add('loaded');
          profileDecoration.onerror = () => {
            profileDecoration.hidden = true;
            profileDecoration.removeAttribute('src');
          };
          profileDecoration.src = url;
        }
      } else {
        profileDecoration.hidden = true;
        profileDecoration.classList.remove('loaded');
        profileDecoration.removeAttribute('src');
      }
    }

    async function render(data) {
      clearInterval(spotifyTimer);
      spotifyTimer = null;
      presenceDot.style.display = '';
      presenceImg.style.borderRadius = '50%';
      
      if (!data || !data.discord_user) {
        presenceEl.dataset.state = 'error';
        setPresenceTag('');
        presenceTitle.textContent = 'Not tracked by Lanyard';
        presenceSub.textContent   = 'join discord.gg/lanyard';
        presenceDot.dataset.status = 'offline';
        if (window.__hdMark) window.__hdMark('presence');
        return;
      }

      presenceEl.dataset.state = 'live';
      presenceEl.classList.remove('is-spotify', 'is-playing', 'is-custom');
      presenceBar.hidden = true;
      presenceBarFill.style.width = '0%';
      if (window.__hdMark) window.__hdMark('presence');

      const { discord_user, discord_status, activities, listening_to_spotify, spotify } = data;
      presenceDot.dataset.status = discord_status || 'offline';

      applyProfileDecoration(discord_user);

      // ── SPOTIFY ──
      if (listening_to_spotify && spotify) {
        presenceEl.classList.add('is-spotify');
        setPresenceTag('Listening on Spotify');
        presenceImg.src = spotify.album_art_url || avatarUrl(discord_user);
        presenceTitle.textContent = spotify.song || '—';
        presenceSub.textContent   = `by ${spotify.artist.replaceAll(';', ',') || '—'}`;

        if (spotify.timestamps && spotify.timestamps.start && spotify.timestamps.end) {
          presenceBar.hidden = false;
          const start = spotify.timestamps.start;
          const end   = spotify.timestamps.end;
          const duration = end - start;
          const tick = () => {
            const now = Date.now();
            const pct = Math.max(0, Math.min(100, ((now - start) / duration) * 100));
            presenceBarFill.style.width = pct + '%';
          };
          tick();
          spotifyTimer = setInterval(tick, 1000);
        }
        return;
      }

      // ── GAME / ACTIVITY ──
      const game   = activities && activities.find(a => a.type === ACT_PLAYING);
      const stream = activities && activities.find(a => a.type === ACT_STREAMING);
      const watch  = activities && activities.find(a => a.type === ACT_WATCHING);
      const custom = activities && activities.find(a => a.type === ACT_CUSTOM);
      const act    = game || stream || watch;

      presenceImg.src = avatarUrl(discord_user);

      if (act) {
        presenceImg.style.borderRadius = '10px';
        presenceEl.classList.add('is-playing');
        presenceDot.style.display = 'none';
        const verb = act.type === ACT_STREAMING ? 'Streaming'
                   : act.type === ACT_WATCHING  ? 'Watching'
                   : 'Playing';
        setPresenceTag(verb);
        if (act.assets && act.assets.large_image) {
        presenceImg.src = `https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.large_image}.png`;
        } else {
          const istekle = await fetch(`https://discord.com/api/v10/applications/${act.application_id}/rpc`, {
            headers: {
              'Content-Type': 'application/json'
            }
          });

          const yanital = await istekle.json();

          presenceImg.src = `https://cdn.discordapp.com/app-icons/${act.application_id}/${yanital.icon}?size=1024`;
        };
        presenceDot.dataset.status = 'online';
        presenceTitle.textContent = act.name || '—';
        presenceSub.textContent   = act.details || act.state || 'Now Playing';
        return;
      }

      if (custom) {
        presenceEl.classList.add('is-custom');
        const emoji = custom.emoji
          ? (custom.emoji.id
              ? ''
              : (custom.emoji.name || '') + ' ')
          : '';
        const state = custom.state || '';
        setPresenceTag('Custom Status');
        presenceTitle.textContent = (emoji + state).trim() || (discord_user.global_name || discord_user.username);
        presenceSub.textContent   = STATUS_LABEL[discord_status] || 'Offline';
        return;
      }

      setPresenceTag(STATUS_LABEL[discord_status] || 'Offline');
      presenceTitle.textContent = discord_user.global_name || discord_user.username || 'whisky';
      presenceSub.textContent   = `@${discord_user.username || 'unknown'} - discord.com/users/960884354396090470 `;
    }

    // ── WebSocket connection ──
    let ws = null;
    let heartbeat = null;
    let reconnectTimer = null;
    let initTimeoutTimer = null;
    let gotInitState = false;

    async function checkTrackingStatusViaRest() {
      if (gotInitState) return;
      try {
        const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        const json = await res.json();
        if (json && json.success && json.data) {
          render(json.data);
          gotInitState = true;
        } else {
          presenceEl.dataset.state = 'error';
          presenceTitle.textContent = 'Not tracked by Lanyard';
          presenceSub.textContent   = 'join discord.gg/lanyard';
        }
      } catch (_) {
        presenceEl.dataset.state = 'error';
        presenceTitle.textContent = 'Connection failed';
        presenceSub.textContent   = 'retrying…';
      }
    }

    function connect() {
      clearTimeout(reconnectTimer);
      gotInitState = false;

      try {
        ws = new WebSocket('wss://api.lanyard.rest/socket');
      } catch (e) {
        scheduleReconnect();
        return;
      }

      ws.addEventListener('open', () => { /* waiting for op:1 hello */ });

      ws.addEventListener('message', ev => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch (_) { return; }
        const { op, t, d } = msg;

        if (op === 1) {
          ws.send(JSON.stringify({
            op: 2,
            d: { subscribe_to_id: DISCORD_ID }
          }));
          const interval = (d && d.heartbeat_interval) ? d.heartbeat_interval : 30000;
          clearInterval(heartbeat);
          heartbeat = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ op: 3 }));
          }, interval);
          clearTimeout(initTimeoutTimer);
          initTimeoutTimer = setTimeout(checkTrackingStatusViaRest, 6000);
        } else if (op === 0) {
          if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') {
            gotInitState = true;
            clearTimeout(initTimeoutTimer);
            render(d);
          }
        }
      });

      ws.addEventListener('close', scheduleReconnect);
      ws.addEventListener('error', () => {
        try { ws.close(); } catch (_) {}
      });
    }

    function scheduleReconnect() {
      clearInterval(heartbeat);
      clearTimeout(initTimeoutTimer);
      heartbeat = null;
      presenceEl.dataset.state = 'error';
      reconnectTimer = setTimeout(connect, 4000);
    }

    setTimeout(connect, 1500);
  }

})();
</script>
