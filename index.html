<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky</title>
    <meta name="theme-color" content="#000000">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://whisky.is-a.dev/">
    <meta property="og:title" content="Whisky">
    <meta property="og:site_name" content="Whisky">

    <link rel="canonical" href="https://whisky.is-a.dev/">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
	@font-face {
	    font-family: 'Inter';
		src: url('https://font.download/cdn/webfont/sf-pro-display/SFPRODISPLAYREGULAR.woff') format('woff');
	}
	
        /* --- loader --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(71, 0, 186, 0.3);
            border-radius: 50%;
            border-top-color: #4700ba;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .click-text {
             font-size: 1.5rem;
             font-weight: 700;
             letter-spacing: 2px;
             color: #fff;
             text-transform: uppercase;
             text-shadow: 0 0 15px rgba(71, 0, 186, 0.5);
             transition: all 0.5s ease;
        }

        .click-text:hover {
             color: #9d71e3;
             transform: scale(1.02);
        }

        /* --- core --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        ::selection {
    background-color: rgba(71, 0, 186, 0.4); 
    color: #fff;
    text-shadow: 0 0 5px rgba(71, 0, 186, 0.8);
}


        body {
            background-color: #050505;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 25px 25px;
            color: #fff;
            height: 100vh; /* Fixed height */
            width: 100%;
            overflow: hidden; /* Prevent scroll */
            position: relative;
            /* Flex and Perspective moved to .main-wrapper */
        }

        .main-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            position: relative;
            z-index: 5; /* lower than cursor */
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        #audio-visualizer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            pointer-events: none;
            z-index: 4;
        }

        /* --- card design --- */
        .card {
            background: rgba(10, 10, 10, 0.6);
            width: 440px;
            max-width: 90%;
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid rgba(71, 0, 186, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(71, 0, 186, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s ease-out;
            margin: 20px auto;
            transform-style: preserve-3d;
            will-change: transform;
            overflow: hidden;
        }

        .card:hover {
            box-shadow: 0 20px 60px rgba(71, 0, 186, 0.2);
            /* background kept constant for transparency */
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--glare-x, 50%) var(--glare-y, 50%),
                    rgba(255, 255, 255, 0.08) 0%,
                    transparent 60%);
            pointer-events: none;
            z-index: 20;
        }

        /* --- profile area --- */
        .profile-wrapper {
            position: relative;
            width: 125px;
            height: 125px;
            margin: 0 auto 20px auto;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateZ(50px);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            background-color: #0a0a0a;
        }

        .profile-wrapper:hover {
            transform: scale(1.1) rotate(5deg) translateZ(80px);
        }

        .profile-wrapper:hover .profile-img {
            border-color: #4700ba;
            box-shadow: 0 0 25px rgba(71, 0, 186, 0.4);
        }


        .custom-status {
            transform: translateZ(30px);
        }

        .badge {
            transform: translateZ(35px);
        }

        .skills-container {
            transform: translateZ(35px);
        }

        .activities-wrapper {
            transform: translateZ(20px);
        }


        .view-counter {
            transform: translateZ(15px);
        }

        .status-indicator {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 4px solid #0a0a0a;
            background-color: #747f8d;
            z-index: 2;
        }

        .status-online {
            background-color: #3ba55c;
            box-shadow: 0 0 12px #3ba55c;
        }

        .status-idle {
            background-color: #faa61a;
            box-shadow: 0 0 12px #faa61a;
        }

        .status-dnd {
            background-color: #ed4245;
            box-shadow: 0 0 12px #ed4245;
        }

        /* --- texts --- */
        h1 {
            display: inline-block;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #4700ba, #ffffff, #888888, #4700ba);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            transform: translateZ(40px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: shine 5s linear infinite;
            filter: drop-shadow(0 0 12px rgba(71, 0, 186, 0.4));
        }

        h1:hover {
            transform: translateZ(60px) scale(1.06);
            animation: shine 5s linear infinite;
            filter: drop-shadow(0 0 20px rgba(71, 0, 186, 0.6));
        }

        @keyframes shine {
            to {
                background-position: 300% center;
            }
        }

        .custom-status {
           display: inline-block;
           font-style: italic;
           color: #bbb;
           font-size: 0.9rem;
           margin-bottom: 15px;
           transition: all 0.3s ease;
           transform: translateZ(30px);
        }

        .custom-status:hover {
            color: #eee;
            transform: translateZ(45px) scale(1.02);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .badge {
            display: inline-block;
            background: rgba(71, 0, 186, 0.1);
            color: #6303ff;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 25px;
            border: 1px solid rgba(71, 0, 186, 0.2);
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 rgba(71, 0, 186, 0.2);
            transform: translateZ(35px);
        }

        .badge:hover {
            background: rgba(71, 0, 186, 0.2);
            border-color: #4700ba;
            transform: translateY(-2px) translateZ(50px);
            box-shadow: 0 6px 0 rgba(71, 0, 186, 0.3);
        }

        /* --- silver skill badges --- */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            padding: 0 10px;
            transform-style: preserve-3d;
        }

        .skill-badge {
            display: inline-block;
            background: rgba(192, 192, 192, 0.08);
            color: #C0C0C0;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(192, 192, 192, 0.2);
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 0 rgba(192, 192, 192, 0.15);
            transform: translateZ(20px);
        }

        .skill-badge:hover {
            background: rgba(192, 192, 192, 0.15);
            border-color: #C0C0C0;
            transform: translateY(-2px) translateZ(35px);
            color: #fff;
            box-shadow: 0 5px 0 rgba(192, 192, 192, 0.2);
        }

        /* --- activities --- */
        .activities-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .activity-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
            transform: translateZ(25px);
        }

        .activity-box:hover {
            border-color: rgba(71, 0, 186, 0.3);
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.02) translateZ(40px);
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.4);
        }

        .activity-img {
            width: 65px;
            height: 65px;
            border-radius: 10px;
            object-fit: cover;
        }

        .activity-info {
            text-align: left;
            flex: 1;
            overflow: hidden;
        }

        .activity-header {
            font-size: 0.65rem;
            color: #4700ba;
            text-transform: uppercase;
            font-weight: 800;
        }

        .activity-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        .activity-details {
            font-size: 0.8rem;
            color: #999;
        }

        /* --- fixed bottom card --- */
        .social-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(71, 0, 186, 0.06);
            padding: 18px;
            border-radius: 24px;
            border: 1px solid rgba(71, 0, 186, 0.25);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(25px);
        }

        .social-links:hover {
            transform: translateY(-5px) translateZ(40px);
            background: rgba(71, 0, 186, 0.08);
            border-color: rgba(71, 0, 186, 0.4);
            box-shadow: 0 15px 40px rgba(71, 0, 186, 0.15);
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: #4700ba;
            color: #000;
            transform: translateY(-5px) translateZ(30px);
            box-shadow: 0 5px 15px rgba(71, 0, 186, 0.4);
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
        }

        /* spotify bar */
        .bars {
            display: flex;
            align-items: flex-end;
            height: 14px;
            gap: 2px;
            margin-left: auto;
        }

        .bar {
            width: 3px;
            background-color: #1db954;
            animation: bounce 1s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                height: 20%;
            }

            50% {
                height: 100%;
            }
        }

        /* view counter */
        .view-counter {
            position: absolute;
            bottom: 15px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #bbb;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .view-counter:hover {
            background: rgba(71, 0, 186, 0.1);
            color: #d4af37;
            border-color: rgba(71, 0, 186, 0.3);
            transform: scale(1.05) translateZ(10px);
        }

        .view-counter i {
            animation: eye-pulse 2s infinite;
        }

        @keyframes eye-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* --- background video --- */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(3px) brightness(0.6);
            transform: scale(1.05); /* prevent blur edges */
        }

        /* --- volume control --- */
        .volume-control {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateZ(20px);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .volume-control:hover {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(71, 0, 186, 0.3);
            transform: translateX(-50%) translateZ(30px);
        }

        .volume-icon {
            color: #ccc;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transition: all 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            background: #4700ba;
            transform: scale(1.2);
        }
        .volume-icon:hover {
            color: #4700ba;
            text-shadow: 0 0 10px rgba(71, 0, 186, 0.5);
            transform: scale(1.1);
        }

        /* --- mobile responsive --- */
        @media (max-width: 768px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
                background-size: 15px 15px; 
            }

            .main-wrapper {
                height: auto;
                min-height: 100vh;
                padding: 40px 0;
                perspective: none; 
                align-items: flex-start; 
            }

            .card {
                width: 85%;
                margin: 0 auto;
                transform: none !important; 
                padding-bottom: 80px; 
            }
            .card:hover {
                 transform: none !important;
                 box-shadow: 0 10px 30px rgba(71, 0, 186, 0.1);
            }
            
            .view-counter {
                left: 50%;
                transform: translateX(-50%);
                bottom: 15px;
                width: max-content;
            }

            .volume-control {
                bottom: 60px; 
                width: 80%;
                justify-content: center;
            }
            
            input[type=range] {
                width: 100%;
            }

            #audio-visualizer {
                display: none !important;
            }
        }
    </style>
	<style>
	 * {
	 cursor: url('cursor.cur'), auto;
	 }
	</style>
	</head>

<body>
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <h1 style="font-size: 1.2rem; margin:0; animation: none;">Loading..</h1>
        </div>
    </div>

    <video id="bg-video" autoplay loop muted playsinline preload="auto">
        <source src="video.mp4" type="video/mp4">
    </video>
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <canvas id="snow-canvas"></canvas>
    <canvas id="audio-visualizer"></canvas>

    <div class="main-wrapper">
        <div class="card">
        <div class="profile-wrapper">
            <img src="" alt="Profile"
                class="profile-img" id="avatar">
            <div class="status-indicator" id="status-dot"></div>
        </div>

        <h1 id="username"></h1>
        <br>
        <div id="custom-status" class="custom-status"></div>
        <br>

        <div class="badge" id="dcusernamex"></div>

        <div class="skills-container">
            <span class="skill-badge"><i class="fa-brands fa-js"></i>&nbsp;Javascript</span>
			<span class="skill-badge"><i class="fa-brands fa-typescript"></i>&nbsp;TypeScript</span>
            <span class="skill-badge">C++</span>
        </div>

        <div class="activities-wrapper" id="activities-wrapper">
        </div>
        <br>
        <br>
        
        
        <!-- Volume Control -->
        <div class="volume-control">
            <i class="fas fa-volume-mute volume-icon" id="vol-icon"></i>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0">
        </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
